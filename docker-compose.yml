version: "3.9"

services:
  fightmind-python-api:
    build: .
    container_name: fightmind-model-container
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Mount the processed data to persist ChromaDB index between container runs
      # if we decide not to bake it permanently into the image
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
